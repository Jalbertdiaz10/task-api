info:
  name: API REST
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:8080/auth/register
  headers:
    - name: Name
      value: Content-Type
    - name: Value
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "José Alberto",
        "email": "jose@example.com",
        "password": "123456"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
