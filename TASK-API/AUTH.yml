info:
  name: AUTH
  type: http
  seq: 5

http:
  method: POST
  url: http://localhost:8080/auth/login
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "jose@example.com",
        "password": "123456"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
